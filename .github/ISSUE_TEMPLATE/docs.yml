name: "📚 Documentation"
description: Improve or create technical documentation.
title: "📚 [Docs] "
labels:
  - kind:docs
body:
  - type: textarea
    id: doc_scope
    attributes:
      label: Documentation Scope
      description: What docs are missing, outdated, or unclear?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Audience & Usage
      description: Who needs this documentation and when?
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: "- [ ] Docs drafted\n- [ ] Examples/commands validated\n- [ ] Linked references updated\n- [ ] Reviewed by owning squad"
    validations:
      required: true
  - type: input
    id: linked_spike_phase
    attributes:
      label: Linked Spike / Phase
      placeholder: "#123, phase:0b-foundations"
    validations:
      required: true

