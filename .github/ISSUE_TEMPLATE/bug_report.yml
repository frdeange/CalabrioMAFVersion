name: "🐛 Bug Report"
description: Report a defect that needs investigation and fix.
title: "🐛 [Bug] "
labels:
  - kind:bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include exact reproduction steps, inputs, and environment.
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      description: Completion criteria for this issue.
      value: "- [ ] Root cause identified\n- [ ] Fix implemented\n- [ ] Tests updated\n- [ ] Docs updated if behavior changed"
    validations:
      required: true
  - type: input
    id: linked_spike_phase
    attributes:
      label: Linked Spike / Phase
      description: Link related spike and/or phase label (for example, #123 + phase:1-mcp-base).
      placeholder: "#123, phase:0b-foundations"
    validations:
      required: true
