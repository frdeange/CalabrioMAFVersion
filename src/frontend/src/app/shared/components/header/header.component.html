<header class="header">
  <div class="header__left">
    <div class="header__title">
      <span class="header__icon">💬</span>
      <h1>Supervisor assist</h1>
      <button class="header__info" type="button" aria-label="Info">ⓘ</button>
    </div>
  </div>

  <div class="header__right">
    <button type="button" class="btn btn--outline" (click)="startNewChat()">
      <span>＋</span> New chat
    </button>

    <div class="header__agent">
      <span class="header__agent-label">Agent</span>
      <select class="header__agent-select">
        <option value="supervisor-workflow-v3">supervisor-workflow-v3</option>
      </select>
    </div>

    <div class="header__status">
      <span class="status-dot status-dot--online"></span>
      <button type="button" class="header__details">Details</button>
    </div>
  </div>
</header>
