services:
  agent-host:
    build: ./src/agent_host
    ports: ["8000:8000"]
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import socket;s=socket.socket();s.settimeout(2);s.connect(('127.0.0.1',8000));s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mcp-wfm:
        condition: service_healthy

  mcp-wfm:
    build: ./src/mcp_wfm
    ports: ["8001:8001"]
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import socket;s=socket.socket();s.settimeout(2);s.connect(('127.0.0.1',8001));s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./src/frontend
    ports: ["8080:80"]
    depends_on:
      agent-host:
        condition: service_healthy
